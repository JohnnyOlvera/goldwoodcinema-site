<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Future of Serialized Storytelling | Goldwood Cinema</title>

<meta name="description"
content="A strategic perspective on creator ecosystems, microdramas, social platforms, and the future of entertainment.">

<style>

:root{
  --bg:#0b0f14;
  --panel:#121821;
  --text:#f5f7fa;
  --muted:#a9b3c1;
  --blue:#3b82f6;
  --line:rgba(59,130,246,.25);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,Helvetica,sans-serif;
  background:#0b0f14;
  color:var(--text);
  line-height:1.7;
}

.container{
  width:min(1200px,92%);
  margin:auto;
}

.hero{
  padding:120px 0 80px;
  text-align:center;
}

.eyebrow{
  color:var(--blue);
  text-transform:uppercase;
  letter-spacing:.18em;
  font-size:.8rem;
  margin-bottom:18px;
  font-weight:700;
}

h1{
  font-size:clamp(3rem,7vw,6rem);
  line-height:.95;
  margin-bottom:24px;
  letter-spacing:-.05em;
}

.hero p{
  max-width:900px;
  margin:0 auto 30px;
  color:var(--muted);
  font-size:1.2rem;
}

.button{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:14px 28px;
  border-radius:999px;
  background:var(--blue);
  color:white;
  text-decoration:none;
  font-weight:700;
  transition:.2s ease;
}

.button:hover{
  transform:translateY(-2px);
}

.pdf-wrap{
  padding:0 0 80px;
}

.pdf-card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:24px;
  padding:24px;
}

iframe{
  width:100%;
  height:1000px;
  border:none;
  border-radius:12px;
  background:white;
}

.footer{
  padding:60px 0;
  text-align:center;
  border-top:1px solid rgba(255,255,255,.08);
}

.footer a{
  color:var(--blue);
  text-decoration:none;
}

</style>
</head>

<body>

<section class="hero">
  <div class="container">

    <div class="eyebrow">
      Goldwood Cinema Insight Series
    </div>

    <h1>
      The Future of<br>
      Serialized Storytelling
    </h1>

    <p>
      A strategic perspective on creator ecosystems,
      microdramas, social platforms, and the next generation
      of entertainment.
    </p>

    <a
      class="button"
      href="Future_of_Serialized_Storytelling.pdf"
      target="_blank">
      Download PDF
    </a>

  </div>
</section>

<section class="pdf-wrap">
  <div class="container">

    <div class="pdf-card">

      <iframe
        src="Future_of_Serialized_Storytelling.pdf">
      </iframe>

    </div>

  </div>
</section>

<footer class="footer">
  <div class="container">

    <p>
      © 2026 Goldwood Cinema
    </p>

    <p>
      <a href="/">
        Return to GoldwoodCinema.com
      </a>
    </p>

  </div>
</footer>

</body>
</html>
